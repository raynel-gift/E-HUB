<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Shop – Checkout</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <nav>
    <div class="logo">E-Shop</div>
    <a href="cart.html" class="cart-link">← Back to Cart</a>
  </nav>
</header>

<main>
   <div class="list">
   <a href="index.html" class="">home</a> 
    <a href="checkout.html" class="">checkout</a> 
    <a href="cart.html" class="">chart</a> 
    
  </div>
  
  <h1>Checkout</h1>

  <!-- Order summary filled by JS -->
  <div id="orderSummary"
       style="margin-bottom:2rem; padding:1rem; border:1px solid #ddd; border-radius:8px;">
  </div>

  <form id="checkoutForm" novalidate>

    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="John Doe" required/>
    <div class="error" id="nameError"
         style="display:none; color:red; font-size:0.85rem;">Name is required.</div>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="john@email.com" required/>
    <div class="error" id="emailError"
         style="display:none; color:red; font-size:0.85rem;">Valid email is required.</div>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="0701234567" required/>
    <div class="error" id="phoneError"
         style="display:none; color:red; font-size:0.85rem;">Valid phone number (9–15 digits) is required.</div>

    <label for="address">Delivery Address</label>
    <input type="text" id="address" placeholder="Kampala, Uganda" required/>
    <div class="error" id="addressError"
         style="display:none; color:red; font-size:0.85rem;">Address is required.</div>

    <button type="submit"
            style="margin-top:1rem; padding:1rem 2rem; font-size:1.1rem;
                   background:#198754; color:#fff; border:none; border-radius:8px; cursor:pointer;">
      Place Order
    </button>

  </form>
</main>

<script src="products.js"></script>
</body>
</html>
